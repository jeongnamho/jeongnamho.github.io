# All possible configuration.
# For more see: http://jekyllrb.com/docs/configuration/
destination: ./_site
lsi:         false
port:        4000
highligher:  true

# Build settings
markdown:    kramdown
rdiscount:
  extensions: [smart]

# This is the default base url path.
baseurl: "" # the subpath of your site, e.g. /blog/
url: "https://jeongnamho.github.io/" # the base hostname & protocol for your site

# Website title.
title : Namho's room<small>Mathematical Data Science & Development</small>

# label listing. [create labels for category in folder `_label`]
# social listing. [create labels for social in folder `_label`]
collections:
  - category
  - social

# This is the default format.
# For more see: http://jekyllrb.com/docs/permalinks/
permalink: /:title

# Pagination based on number of posts
# For more see: http://jekyllrb.com/docs/pagination/
#paginate: 20
#paginate_path: "page/:num"

  ## Author Details ##
###########################
author:
# Info
  name: Namho Jeong
  role: Computer Programmer
  email: jnh7807@snu.ac.kr
  image: images/jeongnamho.jpg
# Social
  github: "https://github.com/jeongnamho"
  # twitter: talk2ankan
  # facebook: talk2ankan
  # soundcloud: meliodus
  # reddit: talk2ankan
#  About
  about: "Salutation, this is my-space my-world. I dream , i hallucinate, i am curious and ambitious."
# copyright
  copyright: "Some rights reserved &#169; 2020 Namho Jeong."

# Disable custom plugins,and ignore symbolic links..
# For more see: http://jekyllrb.com/docs/configuration/
safe:    false
# Jekyll-sitemap auto generate
# For more see: https://github.com/jekyll/jekyll-sitemap
gems:
  - jekyll-sitemap
